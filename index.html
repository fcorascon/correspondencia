<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correspondencia | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>ACCESO AL SISTEMA</h2>
            <form id="loginForm" class="login-form">
                <input type="text" id="loginUser" placeholder="USUARIO" required>
                <input type="password" id="loginPass" placeholder="CONTRASEÑA" required>
                <button type="submit" class="btn-login">ENTRAR</button>
            </form>
            <div id="loginError" class="login-error">USUARIO O CONTRASEÑA INCORRECTOS</div>
        </div>
    </div>
    <aside>
        <div class="logo">Correspondencia</div>
        <nav>
            <div class="nav-item active" data-section="recibida">
                <i class="bi bi-envelope-check"></i> Recibida
            </div>
            <div class="nav-item" data-section="despachada">
                <i class="bi bi-send"></i> Despachada
            </div>
            <div class="nav-item" data-section="iniciativas">
                <i class="bi bi-file-earmark-text"></i> Iniciativas
            </div>
            <div class="nav-item" data-section="proposiciones">
                <i class="bi bi-pencil-square"></i> Proposiciones
            </div>
        </nav>
    </aside>

    <header>
        <div class="search-container">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar en Correspondencia...">
        </div>
        <div class="user-profile">
            <span>Admin</span>
            <button class="btn-logout" title="Cerrar Sesión">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </header>

    <main id="contentArea">
        <div class="section-header">
            <h1 id="sectionTitle">Recibida</h1>
            <button class="btn-add" onclick="openModal()"><i class="bi bi-plus-lg"></i> Agregar</button>
        </div>
        <div class="grid-container" id="dataGrid">
            <!-- Data will be loaded here -->
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Nuevo Registro</h2>
            <form id="dataForm">
                <div class="form-grid" id="formFields">
                    <!-- Fields will be dynamically generated based on section -->
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-add">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
